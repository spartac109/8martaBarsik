<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #0a0a0a; color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .step { display: none; }
        .active { display: block; animation: zoomIn 0.5s ease; }
        
        h1 { font-size: 3.5rem; margin-bottom: 20px; color: #ff4d4d; text-shadow: 0 0 20px rgba(255, 77, 77, 0.6); }
        button { padding: 15px 35px; font-size: 1.3rem; cursor: pointer; border: none; border-radius: 50px; margin: 10px; transition: 0.3s; font-weight: bold; }
        
        .btn-main { background: #ff4d4d; color: white; box-shadow: 0 5px 15px rgba(255, 77, 77, 0.4); }
        .btn-main:hover { transform: scale(1.1); background: #ff3333; }
        .btn-move { background: #333; color: #888; position: absolute; }

        /* Контейнер для сердца */
        #heart-container { position: relative; width: 400px; height: 400px; margin: 0 auto; transform: scale(1); animation: heartBeat 1.4s infinite; }
        .heart-element { position: absolute; color: #ff1a1a; font-weight: bold; text-shadow: 0 0 5px rgba(255, 0, 0, 0.8); transition: 0.5s; }
        
        /* Лепестки на фоне */
        .petal { position: absolute; color: #ff4d6d; pointer-events: none; z-index: -1; animation: fall linear forwards; }

        @keyframes heartBeat {
            0% { transform: scale(0.95); }
            5% { transform: scale(1.1); }
            39% { transform: scale(0.85); }
            45% { transform: scale(1); }
            60% { transform: scale(0.95); }
            100% { transform: scale(0.9); }
        }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes fall { to { transform: translateY(110vh) rotate(540deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="step1" class="step active">
        <h1>Хуй те!</h1>
        <p style="font-size: 1.2rem; opacity: 0.7;">Ну ладно, нажми уже...</p>
        <button class="btn-main" onclick="nextStep(2)">Нажми</button>
    </div>

    <div id="step2" class="step">
        <h1 style="font-size: 4rem;">Сасала?</h1>
        <div style="height: 100px;">
            <button id="noBtn" class="btn-move" onmouseover="moveButton()" onclick="moveButton()">Нэ</button>
            <button class="btn-main" style="margin-top: 50px;" onclick="nextStep(3)">Дэ</button>
        </div>
    </div>

    <div id="step3" class="step">
        <div id="heart-container"></div>
        <h2 style="margin-top: 20px; color: #ff4d4d; font-size: 2rem;">С 8 Марта, любимая вредина! ❤️</h2>
        <p>Ты как красная лилия — такая же красивая и особенная.</p>
    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            if(step === 3) {
                createEnhancedHeart();
                setInterval(createBackgroundPetal, 200);
            }
        }

        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function createEnhancedHeart() {
            const container = document.getElementById('heart-container');
            const items = ["I Love You", "⚜️", "❤", "Lily"]; // Смесь текста и символов лилии
            const total = 60; // Больше элементов для плотности

            for (let i = 0; i < total; i++) {
                const span = document.createElement('span');
                span.className = 'heart-element';
                span.innerText = items[i % items.length];
                
                const t = (i / total) * 2 * Math.PI;
                // Математическая формула идеального сердца
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                span.style.left = (200 + x * 12) + 'px';
                span.style.top = (180 + y * 12) + 'px';
                span.style.fontSize = (Math.random() * 10 + 12) + 'px';
                span.style.opacity = Math.random() * 0.5 + 0.5;
                
                container.appendChild(span);
            }
        }

        function createBackgroundPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerHTML = Math.random() > 0.5 ? '🌸' : '⚜️';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.top = '-20px';
            petal.style.fontSize = Math.random() * 20 + 10 + 'px';
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 5000);
        }
    </script>
</body>
</html>
