<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сюрприз!</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #1a1a1a; color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .step { display: none; }
        .active { display: block; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 10px; margin: 10px; transition: 0.3s; }
        .btn-next { background: #ff4d4d; color: white; }
        .btn-move { background: #555; color: white; position: absolute; }
        
        /* Сердце */
        #heart-container { position: relative; width: 300px; height: 300px; margin: 0 auto; }
        .heart-text { position: absolute; color: #ff4d4d; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="step1" class="step active">
        <h1>Хуй те!</h1>
        <p>...ну ладно, шучу)</p>
        <button class="btn-next" onclick="nextStep(2)">Нажми сюда</button>
    </div>

    <div id="step2" class="step">
        <h1>Сасала?</h1>
        <button id="noBtn" class="btn-move" onmouseover="moveButton()" onclick="moveButton()">Нэ</button>
        <button class="btn-next" style="margin-top: 100px;" onclick="nextStep(3)">Дэ</button>
    </div>

    <div id="step3" class="step">
        <div id="heart-container"></div>
        <h2 style="margin-top: 20px;">Я тебя люблю! ❤️</h2>
        <p>С 8 марта, вредина!</p>
    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            if(step === 3) createHeart();
        }

        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function createHeart() {
            const container = document.getElementById('heart-container');
            const words = "I LOVE YOU";
            for (let i = 0; i < 30; i++) {
                const span = document.createElement('span');
                span.innerText = words;
                span.className = 'heart-text';
                
                // Формула сердца
                const t = (i / 30) * 2 * Math.PI;
                const x = 160 * Math.pow(Math.sin(t), 3);
                const y = -(130 * Math.cos(t) - 50 * Math.cos(2*t) - 20 * Math.cos(3*t) - 10 * Math.cos(4*t));
                
                span.style.left = (150 + x/1.5) + 'px';
                span.style.top = (150 + y/1.5) + 'px';
                span.style.fontSize = Math.random() * (15 - 10) + 10 + 'px';
                container.appendChild(span);
            }
        }
    </script>
</body>
</html>
